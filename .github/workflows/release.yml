name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.2.3)'
        required: true
        type: string
      release_type:
        description: 'Release type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch
          - prerelease

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: js
        run: npm ci

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"

      - name: Bump JavaScript package version
        working-directory: js
        run: |
          if [ "${{ github.event.inputs.version }}" != "" ]; then
            npm version "${{ github.event.inputs.version }}" --no-git-tag-version --ignore-scripts
          else
            npm version "${{ github.event.inputs.release_type }}" --no-git-tag-version --ignore-scripts
          fi
          NEW_VERSION=$(node -p "require('./package.json').version")
          echo "NEW_VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

      - name: Update JavaScript README version references
        run: sed -i "s/log-lazy@[0-9]\+\.[0-9]\+\.[0-9]\+/log-lazy@${{ env.NEW_VERSION }}/g" js/README.md || true

      - name: Commit version bump
        run: |
          git add js/package.json js/package-lock.json js/README.md
          git commit -m "chore: bump JavaScript package to ${{ env.NEW_VERSION }}"
          git push origin main

      - name: Publish to npm
        working-directory: js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git tag -a "v${{ env.NEW_VERSION }}" -m "Release v${{ env.NEW_VERSION }}"
          git push origin "v${{ env.NEW_VERSION }}"
          gh release create "v${{ env.NEW_VERSION }}" \
            --title "Release v${{ env.NEW_VERSION }}" \
            --notes "https://www.npmjs.com/package/log-lazy/v/${{ env.NEW_VERSION }}

          \`\`\`bash
          bun i log-lazy@${{ env.NEW_VERSION }}
          npm i log-lazy@${{ env.NEW_VERSION }}
          yarn add log-lazy@${{ env.NEW_VERSION }}
          pnpm add log-lazy@${{ env.NEW_VERSION }}
          deno add npm:log-lazy@${{ env.NEW_VERSION }}
          \`\`\`

          Documentation: https://github.com/${{ github.repository }}/blob/main/js/README.md"
