name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      docs-only: ${{ steps.changes.outputs.docs-only }}
      js-changed: ${{ steps.changes.outputs.js-changed }}
      rust-changed: ${{ steps.changes.outputs.rust-changed }}
      md-changed: ${{ steps.changes.outputs.md-changed }}
      package-changed: ${{ steps.changes.outputs.package-changed }}
      workflow-changed: ${{ steps.changes.outputs.workflow-changed }}
      any-code-changed: ${{ steps.changes.outputs.any-code-changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git fetch origin "$BASE_SHA"
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          else
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git ls-tree --name-only -r HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE '^js/'; then
            echo "js-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "js-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^(rust/|Cargo\.toml|Cargo\.lock)'; then
            echo "rust-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "rust-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '\.md$'; then
            echo "md-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "md-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^js/(package\.json|package-lock\.json|bun\.lock)$|^rust/Cargo\.toml$|^Cargo\.toml$'; then
            echo "package-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "package-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^\.github/workflows/'; then
            echo "workflow-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflow-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -n "$CHANGED_FILES" ] && ! echo "$CHANGED_FILES" | grep -vqE '^(docs/|.*\.md$)'; then
            echo "docs-only=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs-only=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^(js/|rust/|Cargo\.toml|Cargo\.lock|\.github/workflows/)'; then
            echo "any-code-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any-code-changed=false" >> "$GITHUB_OUTPUT"
          fi

  check-file-line-limits:
    name: Check File Line Limits
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      always() && !cancelled() && (
        needs.detect-changes.outputs.js-changed == 'true' ||
        needs.detect-changes.outputs.rust-changed == 'true' ||
        needs.detect-changes.outputs.md-changed == 'true' ||
        needs.detect-changes.outputs.workflow-changed == 'true'
      )
    steps:
      - uses: actions/checkout@v6

      - name: Enforce 1500-line file limit
        shell: bash
        run: |
          failures=0
          while IFS= read -r file; do
            line_count=$(wc -l < "$file")
            echo "$file: $line_count lines"
            if [ "$line_count" -gt 1500 ]; then
              echo "::error file=$file::File has $line_count lines (limit: 1500)"
              failures=$((failures + 1))
            fi
          done < <(
            find . -type f \( \
              -name "*.js" -o \
              -name "*.mjs" -o \
              -name "*.cjs" -o \
              -name "*.rs" -o \
              -name "*.md" -o \
              -path "./.github/workflows/*.yml" -o \
              -path "./.github/workflows/*.yaml" \
            \) | grep -vE '/(node_modules|target|\.git)/'
          )

          if [ "$failures" -ne 0 ]; then
            exit 1
          fi

  version-check:
    name: Check npm Version
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      needs.detect-changes.outputs.docs-only == 'false' &&
      (github.event_name == 'push' ||
        needs.detect-changes.outputs.js-changed == 'true' ||
        needs.detect-changes.outputs.package-changed == 'true')
    outputs:
      should_publish: ${{ steps.check.outputs.should_publish }}
      version: ${{ steps.check.outputs.version }}
      package_name: ${{ steps.check.outputs.package_name }}
      npm_version: ${{ steps.check.outputs.npm_version }}
    steps:
      - uses: actions/checkout@v6

      - name: Check if npm version needs publishing
        id: check
        working-directory: js
        shell: bash
        run: |
          CURRENT_VERSION=$(node -p "require('./package.json').version")
          PACKAGE_NAME=$(node -p "require('./package.json').name")
          NPM_VERSION=$(npm view "$PACKAGE_NAME" version 2>/dev/null || echo "not-found")

          echo "Package: $PACKAGE_NAME"
          echo "Current version: $CURRENT_VERSION"
          echo "NPM version: $NPM_VERSION"
          echo "package_name=$PACKAGE_NAME" >> "$GITHUB_OUTPUT"
          echo "version=$CURRENT_VERSION" >> "$GITHUB_OUTPUT"
          echo "npm_version=$NPM_VERSION" >> "$GITHUB_OUTPUT"

          if [ "${{ github.event_name }}" = "pull_request" ]; then
            if [ "$NPM_VERSION" = "$CURRENT_VERSION" ]; then
              echo "::error::Version must be bumped for PR. Current version ($CURRENT_VERSION) is already published to npm"
              exit 1
            fi
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ "${{ github.event_name }}" = "push" ] && [ "${{ github.ref }}" = "refs/heads/main" ] && [ "$NPM_VERSION" != "$CURRENT_VERSION" ]; then
            echo "should_publish=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_publish=false" >> "$GITHUB_OUTPUT"
          fi

  js-test:
    name: JavaScript Test (${{ matrix.runtime }} on ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [detect-changes, check-file-line-limits]
    if: |
      always() && !cancelled() &&
      needs.detect-changes.outputs.docs-only == 'false' &&
      (github.event_name == 'push' ||
        needs.detect-changes.outputs.js-changed == 'true' ||
        needs.detect-changes.outputs.package-changed == 'true' ||
        needs.detect-changes.outputs.workflow-changed == 'true') &&
      (needs.check-file-line-limits.result == 'success' || needs.check-file-line-limits.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        runtime: [bun, node, deno]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        if: matrix.runtime == 'bun'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Node.js
        if: matrix.runtime == 'node'
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'

      - name: Setup Deno
        if: matrix.runtime == 'deno'
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install dependencies with Bun
        if: matrix.runtime == 'bun'
        working-directory: js
        run: bun install --frozen-lockfile

      - name: Install dependencies with npm
        if: matrix.runtime == 'node'
        working-directory: js
        run: npm ci

      - name: Run Bun tests
        if: matrix.runtime == 'bun'
        working-directory: js
        run: bun test

      - name: Run Node.js tests
        if: matrix.runtime == 'node'
        working-directory: js
        shell: bash
        run: |
          passed=0
          failed=0
          for file in tests/{bunyan,debug,log4js,pino,winston,simple-ci,fix-attempt,reorder-import}.test.js; do
            output=$(node "$file" 2>&1 || true)
            if echo "$output" | grep -q "0 failed" && echo "$output" | grep -q "passed"; then
              echo "$(basename "$file"): passed"
              passed=$((passed + 1))
            else
              echo "$(basename "$file"): failed"
              echo "$output" | tail -20
              failed=$((failed + 1))
            fi
          done
          echo "Node.js tests: $passed passed, $failed failed"
          test "$failed" -eq 0

      - name: Run Deno tests
        if: matrix.runtime == 'deno'
        working-directory: js
        shell: bash
        run: |
          passed=0
          failed=0
          for file in tests/{debug,log4js,simple-ci,fix-attempt,reorder-import}.test.js; do
            output=$(deno test --allow-read "$file" 2>&1 || true)
            if echo "$output" | grep -q "0 failed" && echo "$output" | grep -q "passed"; then
              echo "$(basename "$file"): passed"
              passed=$((passed + 1))
            else
              echo "$(basename "$file"): failed"
              echo "$output" | tail -20
              failed=$((failed + 1))
            fi
          done
          echo "Deno tests: $passed passed, $failed failed"
          test "$failed" -eq 0

      - name: Run coverage
        if: matrix.os == 'ubuntu-latest' && matrix.runtime == 'bun'
        working-directory: js
        run: bun test --coverage

  rust-test:
    name: Rust Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [detect-changes, check-file-line-limits]
    if: |
      always() && !cancelled() &&
      needs.detect-changes.outputs.docs-only == 'false' &&
      (github.event_name == 'push' ||
        needs.detect-changes.outputs.rust-changed == 'true' ||
        needs.detect-changes.outputs.workflow-changed == 'true') &&
      (needs.check-file-line-limits.result == 'success' || needs.check-file-line-limits.result == 'skipped')
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run Rust tests
        working-directory: rust
        run: cargo test --all-features --verbose

      - name: Run Rust doc tests
        working-directory: rust
        run: cargo test --doc --verbose

  lint-and-typecheck:
    name: Lint and Typecheck
    runs-on: ubuntu-latest
    needs: [detect-changes, check-file-line-limits]
    if: |
      always() && !cancelled() && (
        github.event_name == 'push' ||
        needs.detect-changes.outputs.js-changed == 'true' ||
        needs.detect-changes.outputs.rust-changed == 'true' ||
        needs.detect-changes.outputs.md-changed == 'true' ||
        needs.detect-changes.outputs.package-changed == 'true' ||
        needs.detect-changes.outputs.workflow-changed == 'true'
      ) &&
      (needs.check-file-line-limits.result == 'success' || needs.check-file-line-limits.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        if: github.event_name == 'push' || needs.detect-changes.outputs.js-changed == 'true' || needs.detect-changes.outputs.package-changed == 'true'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install JavaScript dependencies
        if: github.event_name == 'push' || needs.detect-changes.outputs.js-changed == 'true' || needs.detect-changes.outputs.package-changed == 'true'
        working-directory: js
        run: bun install --frozen-lockfile

      - name: Run ESLint
        if: github.event_name == 'push' || needs.detect-changes.outputs.js-changed == 'true' || needs.detect-changes.outputs.package-changed == 'true'
        working-directory: js
        run: bun run lint

      - name: Test TypeScript definitions
        if: github.event_name == 'push' || needs.detect-changes.outputs.js-changed == 'true' || needs.detect-changes.outputs.package-changed == 'true'
        working-directory: js
        run: bun run test:types

      - name: Setup Rust
        if: github.event_name == 'push' || needs.detect-changes.outputs.rust-changed == 'true'
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check Rust formatting
        if: github.event_name == 'push' || needs.detect-changes.outputs.rust-changed == 'true'
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Run Clippy
        if: github.event_name == 'push' || needs.detect-changes.outputs.rust-changed == 'true'
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

  benchmark:
    name: JavaScript Benchmarks
    runs-on: ubuntu-latest
    needs: [detect-changes, js-test]
    if: |
      always() && !cancelled() &&
      needs.js-test.result == 'success' &&
      (github.event_name == 'push' ||
        needs.detect-changes.outputs.js-changed == 'true' ||
        needs.detect-changes.outputs.package-changed == 'true')
    steps:
      - uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        working-directory: js
        run: bun install --frozen-lockfile

      - name: Run benchmarks
        working-directory: js
        run: bun run bench

  validate-docs:
    name: Validate Documentation
    runs-on: ubuntu-latest
    needs: [detect-changes, check-file-line-limits]
    if: |
      always() && !cancelled() &&
      needs.detect-changes.outputs.md-changed == 'true' &&
      (needs.check-file-line-limits.result == 'success' || needs.check-file-line-limits.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Check internal markdown links
        shell: bash
        run: |
          while IFS= read -r file; do
            dir=$(dirname "$file")
            grep -oE '\[[^]]+\]\([^)]+\)' "$file" | sed -E 's/^.*\]\(([^)]+)\)$/\1/' | while read -r link; do
              if [[ "$link" == http* ]] || [[ "$link" == mailto:* ]] || [[ "$link" == \#* ]]; then
                continue
              fi
              target="${link%%#*}"
              if [ -n "$target" ] && [ ! -e "$dir/$target" ]; then
                echo "::warning file=$file::Broken internal link: $link"
              fi
            done || true
          done < <(find . -name "*.md" -type f)

  publish:
    name: Publish npm Package
    needs: [version-check, js-test, rust-test, lint-and-typecheck, benchmark]
    runs-on: ubuntu-latest
    if: |
      always() && !cancelled() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.version-check.outputs.should_publish == 'true' &&
      needs.js-test.result == 'success' &&
      (needs.rust-test.result == 'success' || needs.rust-test.result == 'skipped') &&
      needs.lint-and-typecheck.result == 'success' &&
      (needs.benchmark.result == 'success' || needs.benchmark.result == 'skipped')
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '24.x'
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        working-directory: js
        run: npm ci

      - name: Publish to npm
        working-directory: js
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create Git tag
        run: |
          VERSION="${{ needs.version-check.outputs.version }}"
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git tag -a "$VERSION" -m "Release $VERSION"
          git push origin "$VERSION"

  summary:
    name: Summary
    needs: [detect-changes, check-file-line-limits, version-check, js-test, rust-test, lint-and-typecheck, benchmark, validate-docs, publish]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Workflow summary
        run: |
          echo "## Workflow Summary"
          echo "- Event: ${{ github.event_name }}"
          echo "- Ref: ${{ github.ref_name }}"
          echo "- Docs only: ${{ needs.detect-changes.outputs.docs-only }}"
          echo "- JS changed: ${{ needs.detect-changes.outputs.js-changed }}"
          echo "- Rust changed: ${{ needs.detect-changes.outputs.rust-changed }}"
          echo "- File limits: ${{ needs.check-file-line-limits.result }}"
          echo "- Version check: ${{ needs.version-check.result }}"
          echo "- JavaScript tests: ${{ needs.js-test.result }}"
          echo "- Rust tests: ${{ needs.rust-test.result }}"
          echo "- Lint/typecheck: ${{ needs.lint-and-typecheck.result }}"
          echo "- Benchmarks: ${{ needs.benchmark.result }}"
          echo "- Docs validation: ${{ needs.validate-docs.result }}"
          echo "- Publish: ${{ needs.publish.result }}"
