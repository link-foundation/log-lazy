name: Rust

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref == 'refs/heads/main' }}

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: -Dwarnings
  CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN || secrets.CARGO_TOKEN }}
  CARGO_TOKEN: ${{ secrets.CARGO_TOKEN }}

jobs:
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      rs-changed: ${{ steps.changes.outputs.rs-changed }}
      toml-changed: ${{ steps.changes.outputs.toml-changed }}
      docs-changed: ${{ steps.changes.outputs.docs-changed }}
      workflow-changed: ${{ steps.changes.outputs.workflow-changed }}
      any-code-changed: ${{ steps.changes.outputs.any-code-changed }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Detect changed files
        id: changes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            HEAD_SHA="${{ github.event.pull_request.head.sha }}"
            git fetch origin "$BASE_SHA"
            CHANGED_FILES=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA")
          else
            CHANGED_FILES=$(git diff --name-only HEAD^ HEAD 2>/dev/null || git ls-tree --name-only -r HEAD)
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -qE '^rust/.*\.rs$'; then
            echo "rs-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "rs-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^rust/.*\.toml$|^rust/Cargo\.lock$'; then
            echo "toml-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "toml-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '(^docs/|^rust/.*\.md$|\.md$)'; then
            echo "docs-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^\.github/workflows/rust\.yml$'; then
            echo "workflow-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "workflow-changed=false" >> "$GITHUB_OUTPUT"
          fi

          if echo "$CHANGED_FILES" | grep -qE '^(rust/|\.github/workflows/rust\.yml$)'; then
            echo "any-code-changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "any-code-changed=false" >> "$GITHUB_OUTPUT"
          fi

  lint:
    name: Lint and Format Check
    runs-on: ubuntu-latest
    needs: [detect-changes]
    if: |
      !cancelled() &&
      (github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.rs-changed == 'true' ||
        needs.detect-changes.outputs.toml-changed == 'true' ||
        needs.detect-changes.outputs.docs-changed == 'true' ||
        needs.detect-changes.outputs.workflow-changed == 'true')
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Simulate fresh merge with base branch
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}"
          git merge --no-commit --no-ff "origin/${{ github.base_ref }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Check formatting
        working-directory: rust
        run: cargo fmt --all -- --check

      - name: Run Clippy
        working-directory: rust
        run: cargo clippy --all-targets --all-features -- -D warnings

      - name: Check file size limit
        shell: bash
        run: |
          failures=0
          while IFS= read -r file; do
            limit=1500
            case "$file" in
              docs/*.md|rust/*.md) limit=2500 ;;
            esac
            line_count=$(wc -l < "$file")
            echo "$file: $line_count lines"
            if [ "$line_count" -gt "$limit" ]; then
              echo "::error file=$file::File has $line_count lines (limit: $limit)"
              failures=$((failures + 1))
            fi
          done < <(
            find rust docs .github/workflows -type f \( \
              -name "*.rs" -o \
              -name "*.toml" -o \
              -name "*.md" -o \
              -name "*.yml" -o \
              -name "*.yaml" \
            \) 2>/dev/null | grep -vE '/(target|\.git)/'
          )
          test "$failures" -eq 0

  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    needs: [detect-changes, lint]
    if: |
      !cancelled() &&
      (github.event_name == 'push' ||
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.rs-changed == 'true' ||
        needs.detect-changes.outputs.toml-changed == 'true' ||
        needs.detect-changes.outputs.workflow-changed == 'true') &&
      needs.lint.result == 'success'
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Simulate fresh merge with base branch
        if: github.event_name == 'pull_request'
        shell: bash
        run: |
          git fetch origin "${{ github.base_ref }}"
          git merge --no-commit --no-ff "origin/${{ github.base_ref }}"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Run tests
        working-directory: rust
        run: cargo test --all-features --verbose

      - name: Run doc tests
        working-directory: rust
        run: cargo test --doc --verbose

  build:
    name: Build Package
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: |
      !cancelled() &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            rust/target
          key: ${{ runner.os }}-cargo-build-${{ hashFiles('rust/Cargo.lock', 'rust/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-build-

      - name: Build release
        working-directory: rust
        run: cargo build --release --verbose

      - name: Check package contents
        working-directory: rust
        run: cargo package --list --allow-dirty

  publish:
    name: Publish Crate
    runs-on: ubuntu-latest
    needs: [lint, test, build]
    if: |
      !cancelled() &&
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      needs.lint.result == 'success' &&
      needs.test.result == 'success' &&
      needs.build.result == 'success'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Publish to Crates.io
        working-directory: rust
        run: cargo publish

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=$(cargo metadata --manifest-path rust/Cargo.toml --no-deps --format-version 1 | jq -r '.packages[0].version')
          git tag -a "rust-v$VERSION" -m "Rust release v$VERSION"
          git push origin "rust-v$VERSION"
          gh release create "rust-v$VERSION" \
            --title "Rust v$VERSION" \
            --notes "Crates.io: https://crates.io/crates/log-lazy/$VERSION"

  summary:
    name: Summary
    runs-on: ubuntu-latest
    needs: [detect-changes, lint, test, build, publish]
    if: always()
    steps:
      - name: Workflow summary
        run: |
          echo "## Rust Workflow Summary"
          echo "- Event: ${{ github.event_name }}"
          echo "- Ref: ${{ github.ref_name }}"
          echo "- Rust sources changed: ${{ needs.detect-changes.outputs.rs-changed }}"
          echo "- Cargo files changed: ${{ needs.detect-changes.outputs.toml-changed }}"
          echo "- Docs changed: ${{ needs.detect-changes.outputs.docs-changed }}"
          echo "- Workflow changed: ${{ needs.detect-changes.outputs.workflow-changed }}"
          echo "- Lint: ${{ needs.lint.result }}"
          echo "- Test: ${{ needs.test.result }}"
          echo "- Build: ${{ needs.build.result }}"
          echo "- Publish: ${{ needs.publish.result }}"
